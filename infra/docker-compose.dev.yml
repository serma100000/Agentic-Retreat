version: '3.9'

services:
  postgres:
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis-data:/data

  redpanda:
    volumes:
      - redpanda-data:/var/lib/redpanda/data

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  redpanda-data:
    driver: local
