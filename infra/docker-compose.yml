version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: openpulse-postgres
    environment:
      POSTGRES_USER: openpulse
      POSTGRES_PASSWORD: openpulse_dev
      POSTGRES_DB: openpulse
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openpulse -d openpulse']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openpulse

  redis:
    image: redis:8-alpine
    container_name: openpulse-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - openpulse

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: openpulse-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
    ports:
      - '19092:19092'
      - '18081:18081'
      - '18082:18082'
    healthcheck:
      test: ['CMD-SHELL', "rpk cluster health | grep -q 'Healthy.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - openpulse

  redpanda-console:
    image: redpandadata/console:latest
    container_name: openpulse-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - '8080:8080'
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    networks:
      - openpulse

  mailhog:
    image: mailhog/mailhog:latest
    container_name: openpulse-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8025']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - openpulse

networks:
  openpulse:
    driver: bridge
