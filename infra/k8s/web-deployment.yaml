apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpulse-web
  namespace: openpulse
  labels:
    app: openpulse-web
    app.kubernetes.io/name: openpulse-web
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openpulse-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openpulse-web
        app.kubernetes.io/name: openpulse-web
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: web
          image: openpulse/web:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: openpulse-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
