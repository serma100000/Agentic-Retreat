apiVersion: apps/v1
kind: Deployment
metadata:
  name: openpulse-api
  namespace: openpulse
  labels:
    app: openpulse-api
    app.kubernetes.io/name: openpulse-api
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: openpulse-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openpulse-api
        app.kubernetes.io/name: openpulse-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: openpulse-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: openpulse/api:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openpulse-config
            - secretRef:
                name: openpulse-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
